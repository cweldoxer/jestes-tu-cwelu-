<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>q0pe</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f4f4;
    text-align:center;
}

header{
    background:#222;
    color:white;
    padding:30px;
}

section{
    padding:40px 20px;
}

img{
    max-width:90%;
    border-radius:10px;
    margin:20px 0;
}

.box{
    background:white;
    max-width:800px;
    margin:auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

footer{
    background:#222;
    color:white;
    padding:15px;
    margin-top:40px;
}

/* licznik */
#counter{
    position:fixed;
    top:10px;
    right:10px;
    background:#000;
    color:#fff;
    padding:8px 12px;
    border-radius:8px;
    font-size:14px;
}
</style>
</head>

<body>

<div id="counter">Było tu tyle cweli: ...</div>

<header>
<h1>q0pe</h1>
<p>Ty też tu jesteś?</p>
</header>

<section>
<div class="box">

<h2>Cwel 1</h2>
<p>POLAND FREE SLUT</p>

<img src="https://scontent.xx.fbcdn.net/v/t1.15752-9/646167084_1228952779420185_7018737116665539420_n.jpg">

<p>Łapa dla ciebie byku</p>

</div>
</section>

<section>
<div class="box">

<h2>.1</h2>
<p>.2</p>

<img src="z2">

</div>
</section>

<footer>
<p>buziaczki</p>
</footer>

<script>

const namespace = "q0pe-site"
const key = "visits"

if(!localStorage.getItem("visited")){

fetch(`https://api.countapi.xyz/hit/${namespace}/${key}`)
.then(res => res.json())
.then(res => {
document.getElementById("counter").innerText = "Odwiedziny: " + res.value
})

localStorage.setItem("visited","true")

}else{

fetch(`https://api.countapi.xyz/get/${namespace}/${key}`)
.then(res => res.json())
.then(res => {
document.getElementById("counter").innerText = "Odwiedziny: " + res.value
})

}

</script>

</body>
</html>
