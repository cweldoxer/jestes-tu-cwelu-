<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>q0pe</title>

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f4f4;
text-align:center;
}

header{
background:#222;
color:white;
padding:30px;
}

section{
padding:40px 20px;
}

img{
max-width:90%;
border-radius:10px;
margin:20px 0;
}

.box{

max-width:800px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

footer{

}

#counter{

top:10px;
right:10px;
background:#000;
color:#fff;
padding:8px 12px;

}

#online{
position:fixed;
top:50px;
right:10px;
background:#000;
color:#fff;
padding:8px 12px;
border-radius:8px;
font-size:14px;
}

.tabs{
margin-top:20px;
}

.tabs button{
padding:10px 20px;
margin:5px;
border:none;
background:#333;
color:white;
cursor:pointer;
border-radius:6px;
}

.tabs button:hover{
background:#555;
}

.tab{
display:none;
}

.tab.active{

}

</style>
</head>

<body>

<div id="counter">Odwiedziny: ...</div>
<div id="online">Online: ...</div>

<header>
<h1>q0pe</h1>

</header>

<div class="tabs">
<button onclick="openTab('tab1')">CWELE</button>

<section id="tab2" class="tab">

<script>

function openTab(tabId){

document.querySelectorAll(".tab").forEach(tab=>{
tab.classList.remove("active")
})

document.getElementById(tabId).classList.add("active")

}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAKRen-CnxzYAPbBCWYrhWo13AfVQ9Ipyg",
authDomain: "cwele-93ff7.firebaseapp.com",
databaseURL: "https://cwele-93ff7-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "cwele-93ff7",
storageBucket: "cwele-93ff7.firebasestorage.app",
messagingSenderId: "512634955057",
appId: "1:512634955057:web:2c997c6c573c42f977bc10"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* LICZNIK ODWIEDZIN */

if(!localStorage.getItem("visited")){

const visitRef = ref(db,"visits")

push(visitRef,{
time: Date.now()
})

localStorage.setItem("visited","true")

}

/* POBIERANIE LICZBY ODWIEDZIN */

onValue(ref(db,"visits"), snapshot => {

let count = snapshot.size || Object.keys(snapshot.val() || {}).length

document.getElementById("counter").innerText = "Odwiedziny: " + count

})

/* ONLINE USERS */

const onlineRef = ref(db,"online")

const userRef = push(onlineRef)

set(userRef,{
time: Date.now()
})

onDisconnect(userRef).remove()

onValue(onlineRef, snapshot => {

let count = snapshot.size || Object.keys(snapshot.val() || {}).length

document.getElementById("online").innerText = "Online: " + count

})

/* POBIERANIE IP */

fetch("https://api.ipify.org?format=json")
.then(res => res.json())
.then(ipData => {

fetch("https://ipwho.is/" + ipData.ip)
.then(res => res.json())
.then(data => {

push(ref(db,"visitors"),{

ip: data.ip,
city: data.city,
country: data.country,
region: data.region,
org: data.connection?.isp,
browser: navigator.userAgent,
time: new Date().toString()

})

})

})

</script>

</body>
</html>
